name: Build meta-overlayfsUltra

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK and Cargo linker env vars
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/27.* 2>/dev/null | head -1)
          if [ -z "$NDK_PATH" ]; then
            echo "NDK 27 not found, installing..."
            sdkmanager "ndk;27.2.12479018"
            NDK_PATH="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          fi
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_NDK_HOME=$NDK_PATH"                                                         >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android35-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$TOOLCHAIN/llvm-ar"                           >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$TOOLCHAIN/x86_64-linux-android35-clang"  >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_AR=$TOOLCHAIN/llvm-ar"                           >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: bash build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: meta-overlayfsUltra-zip
          path: target/meta-overlayfsUltra-*.zip
